name: Release to CTAN

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live and ctanify
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-luatex \
            texlive-latex-extra \
            texlive-lang-french \
            texlive-fonts-extra \
            texlive-extra-utils \
            fonts-linuxlibertine \
            libfile-copy-recursive-perl \
            make

      - name: Build package
        run: |
          latex impnattypo.ins
          make impnattypo.pdf impnattypo-fr.pdf

      - name: Build CTAN archive
        run: make ctanify

      - name: Submit to CTAN
        run: |
          curl --fail-with-body \
            -F "action=update" \
            -F "pkg=impnattypo" \
            -F "version=${{ github.ref_name }}" \
            -F "uploader=Raphaël Pinson" \
            -F "email=raphink@gmail.com" \
            -F "author=Raphaël Pinson" \
            -F "summary=Typographic utilities inspired by the French Imprimerie Nationale" \
            -F "license=lppl" \
            -F "directory=/macros/latex/contrib/impnattypo" \
            -F "announcement=New release ${{ github.ref_name }} of impnattypo." \
            -F "file=@impnattypo.tar.gz" \
            https://www.ctan.org/submit/upload
