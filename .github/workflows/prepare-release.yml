name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.7)'
        required: true
      changelog:
        description: 'One-line changelog entry for \changes'
        required: true
      announce:
        description: 'Announcement text for CTAN (leave empty for minor releases)'
        required: false
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Patch impnattypo.dtx and Makefile
        env:
          VERSION: ${{ github.event.inputs.version }}
          CHANGELOG: ${{ github.event.inputs.changelog }}
        run: |
          export DATE=$(date +%Y/%m/%d)

          python3 - <<'EOF'
          import os, re

          version   = os.environ['VERSION']
          changelog = os.environ['CHANGELOG']
          date      = os.environ['DATE']

          with open('impnattypo.dtx') as f:
              content = f.read()

          # Update \ProvidesPackage date and version
          content = re.sub(
              r'(\s*)\[[\d/]+ [\d.]+ (Typographic utilities)',
              lambda m: f'{m.group(1)}[{date} {version} {m.group(2)}',
              content,
          )

          # Remove any existing \changes entry for this version, then
          # insert a single one before the first \changes line
          content = re.sub(r'% \\changes\{' + re.escape(version) + r'\}[^\n]*\n', '', content)
          content = re.sub(
              r'(% \\changes\{)',
              lambda m: f'% \\changes{{{version}}}{{{date}}}{{{changelog}}}\n{m.group(1)}',
              content,
              count=1,
          )

          with open('impnattypo.dtx', 'w') as f:
              f.write(content)
          EOF

          # Update VERSION in Makefile
          sed -i "s|^VERSION *=.*|VERSION       = v${VERSION}|" Makefile

      - name: Commit and tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add impnattypo.dtx Makefile
          git commit -m "Release v${VERSION}"
          git tag -m "${{ github.event.inputs.announce }}" "v${VERSION}"
          git remote set-url origin https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}
          git push origin master "v${VERSION}"
